<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tesla Cam + YouTube</title>
<style>
  :root {
    --accent: #3ea6ff;
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --card: #232323;
    --text: #f1f1f1;
    --muted: #9a9a9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* ---------- layout ---------- */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  #content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .view {
    position: absolute;
    inset: 0;
    display: none;
  }
  .view.active { display: flex; }

  /* ---------- image / player views ---------- */
  #view-player {
    flex-direction: column;
    background: #000;
  }
  .img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }
  .img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .img-wrap.fill img {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    object-fit: cover;
  }
  .top-overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 5;
  }
  .top-overlay > * { pointer-events: auto; }
  .pill {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text);
    max-width: 70%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .icon-btn {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    border: none;
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* player bottom controls */
  .seek-bar {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    z-index: 5;
  }
  .seek-bar span {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 38px;
    text-align: center;
  }
  .seek-bar input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  .player-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    z-index: 5;
  }
  .player-bar button {
    background: var(--card);
    border: none;
    color: var(--text);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .player-bar button.primary { background: var(--accent); color: #000; font-weight: 600; }
  .player-bar .fps-control {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
    flex-shrink: 0;
  }
  .player-bar .fps-control input { width: 80px; }

  /* ---------- search view ---------- */
  #view-search {
    flex-direction: column;
    background: var(--bg);
  }
  .search-bar {
    display: flex;
    gap: 10px;
    padding: 14px;
    background: var(--panel);
  }
  .search-bar input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 24px;
    border: none;
    font-size: 18px;
    background: #2c2c2c;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar button {
    border: none;
    border-radius: 24px;
    padding: 14px 22px;
    background: var(--accent);
    color: #000;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
  }
  .search-bar #clear-btn {
    background: var(--card);
    color: var(--text);
    padding: 14px 18px;
  }
  .chips {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 14px 14px 14px;
    -webkit-overflow-scrolling: touch;
  }
  .chips:empty { padding: 0; }
  .sort-row {
    padding: 0 14px 10px 14px;
    font-size: 14px;
    color: var(--muted);
  }
  .sort-row label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .sort-row input { width: 18px; height: 18px; }
  .chip {
    flex-shrink: 0;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  #results {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .result-card {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .result-card .thumb-wrap {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%; /* ratio 16:9, compatible navigateurs anciens */
    background: #000;
    overflow: hidden;
  }
  .result-card .thumb-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .fav-star {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    color: var(--muted);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
  }
  .fav-star.active { color: #ffd23e; }
  .result-card .info {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 22px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85) 55%);
    z-index: 1;
  }
  .result-card .title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-card .meta {
    margin-top: 4px;
    font-size: 11px;
    line-height: 1.3;
    color: #d6d6d6;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #search-status {
    padding: 30px;
    text-align: center;
    color: var(--muted);
    font-size: 16px;
  }

  /* ---------- settings view ---------- */
  #view-settings {
    flex-direction: column;
    background: var(--bg);
    padding: 20px;
    gap: 16px;
    overflow-y: auto;
  }
  #view-settings h2 { font-size: 20px; margin-bottom: 4px; }
  #view-settings label {
    display: block;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  #view-settings input[type=text] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2c2c2c;
    color: var(--text);
    font-size: 14px;
  }
  #view-settings input[type=range] { width: 100%; }
  #view-settings textarea { font-family: inherit; resize: vertical; }
  #view-settings .row { margin-bottom: 14px; }
  #view-settings button {
    border: none;
    border-radius: 24px;
    padding: 12px 24px;
    background: var(--accent);
    color: #000;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    align-self: flex-start;
  }

  #yt-frame {
    position: fixed;
    bottom: -1000px;
    left: -1000px;
    width: 1px;
    height: 1px;
    border: 0;
  }
</style>
</head>
<body>

<div id="app">
  <div id="content">

    <!-- Recherche YouTube -->
    <div id="view-search" class="view active">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Rechercher sur YouTube...">
        <button id="clear-btn">✕</button>
        <button id="search-btn">🔍</button>
        <button id="settings-btn-yt">⚙️</button>
      </div>
      <div id="favorites" class="chips"></div>
      <div class="sort-row">
        <label><input type="checkbox" id="sort-date"> Trier par date (plus récent)</label>
      </div>
      <div id="results"></div>
    </div>

    <!-- Lecteur YouTube -->
    <div id="view-player" class="view">
      <div class="img-wrap" id="yt-img-wrap"><img id="yt-img" alt="Vidéo"></div>
      <div class="top-overlay">
        <div class="pill" id="player-title">—</div>
        <button class="icon-btn" id="fit-btn" title="Plein écran">⛶</button>
      </div>
      <div class="seek-bar">
        <span id="time-current">0:00</span>
        <input type="range" id="seek" min="0" max="100" value="0" step="1">
        <span id="time-duration">0:00</span>
      </div>
      <div class="player-bar">
        <button id="back-search-btn">🔍 Recherche</button>
        <button id="pause-btn" class="primary">⏸ Pause</button>
        <button id="stop-btn">⏹ Stop</button>
        <div class="fps-control">
          FPS
          <input type="range" id="fps" min="0.5" max="10" step="0.5" value="1">
          <span id="fps-val">1</span>
        </div>
      </div>
    </div>

    <!-- Réglages -->
    <div id="view-settings" class="view">
      <h2>Réglages</h2>
      <div class="row">
        <label>Chaînes favorites (une par ligne, raccourcis sur l'écran de recherche)</label>
        <textarea id="fav-channels" rows="5" style="width:100%;padding:12px;border-radius:8px;border:none;background:#2c2c2c;color:var(--text);font-size:14px;"></textarea>
      </div>
      <button id="settings-close">Fermer</button>
    </div>

  </div>
</div>

<iframe id="yt-frame" allow="autoplay; encrypted-media" frameborder="0"></iframe>

<script>
  const ytImg = document.getElementById('yt-img');
  const fpsSlider = document.getElementById('fps');
  const fpsVal = document.getElementById('fps-val');
  const ytFrame = document.getElementById('yt-frame');

  const views = {
    search: document.getElementById('view-search'),
    player: document.getElementById('view-player'),
    settings: document.getElementById('view-settings')
  };

  let ytTimer = null;
  let currentYtId = null;
  let isPaused = false;

  function showView(name) {
    Object.values(views).forEach(v => v.classList.remove('active'));
    views[name].classList.add('active');
  }

  // ---------- Recherche YouTube ----------
  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const results = document.getElementById('results');

  async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    results.innerHTML = '<div id="search-status">Recherche en cours...</div>';
    try {
      let url = '/yt/search?q=' + encodeURIComponent(q);
      if (sortDateCheckbox.checked) url += '&sort=date';
      const r = await fetch(url);
      const items = await r.json();
      if (!Array.isArray(items) || items.length === 0) {
        results.innerHTML = '<div id="search-status">Aucun résultat</div>';
        return;
      }
      results.innerHTML = '';
      for (const item of items) {
        const card = document.createElement('div');
        card.className = 'result-card';
        const isFav = item.channel && getFavorites().includes(item.channel);
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${item.thumb || ''}" loading="lazy">
            ${item.channel ? `<button class="fav-star${isFav ? ' active' : ''}" title="Favori : ${escapeHtml(item.channel)}">★</button>` : ''}
            <div class="info">
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="meta">${escapeHtml(item.channel || '')}${item.duration ? ' • ' + escapeHtml(item.duration) : ''}${item.published ? ' • ' + escapeHtml(item.published) : ''}</div>
            </div>
          </div>`;
        card.addEventListener('click', () => playVideo(item.id, item.title));
        const star = card.querySelector('.fav-star');
        if (star) {
          star.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavoriteChannel(item.channel, star);
          });
        }
        results.appendChild(card);
      }
    } catch (e) {
      results.innerHTML = '<div id="search-status">Erreur de recherche</div>';
    }
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  const sortDateCheckbox = document.getElementById('sort-date');
  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  sortDateCheckbox.addEventListener('change', () => {
    if (searchInput.value.trim()) doSearch();
  });

  const clearBtn = document.getElementById('clear-btn');
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    results.innerHTML = '';
    renderFavorites();
    searchInput.focus();
  });

  // ---------- Chaînes favorites ----------
  const favTextarea = document.getElementById('fav-channels');
  const favContainer = document.getElementById('favorites');

  function getFavorites() {
    return JSON.parse(localStorage.getItem('favChannels') || '[]');
  }
  function toggleFavoriteChannel(name, starEl) {
    if (!name) return;
    let favs = getFavorites();
    if (favs.includes(name)) {
      favs = favs.filter(f => f !== name);
      if (starEl) starEl.classList.remove('active');
    } else {
      favs.push(name);
      if (starEl) starEl.classList.add('active');
    }
    localStorage.setItem('favChannels', JSON.stringify(favs));
    renderFavorites();
  }
  function renderFavorites() {
    const favs = getFavorites();
    favContainer.innerHTML = '';
    for (const name of favs) {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = name;
      chip.addEventListener('click', () => {
        searchInput.value = name;
        doSearch();
      });
      favContainer.appendChild(chip);
    }
  }
  renderFavorites();

  // ---------- Lecteur YouTube ----------
  const playerTitle = document.getElementById('player-title');
  const pauseBtn = document.getElementById('pause-btn');
  const stopBtn = document.getElementById('stop-btn');
  const backSearchBtn = document.getElementById('back-search-btn');
  const fitBtn = document.getElementById('fit-btn');
  const ytImgWrap = document.getElementById('yt-img-wrap');

  fitBtn.addEventListener('click', () => {
    const filled = ytImgWrap.classList.toggle('fill');
    fitBtn.textContent = filled ? '↩' : '⛶';
    fitBtn.title = filled ? 'Taille normale' : 'Plein écran';
  });

  function postYtCommand(func, args) {
    if (!ytFrame.contentWindow) return;
    ytFrame.contentWindow.postMessage(JSON.stringify({ event: 'command', func, args: args || [] }), '*');
  }

  // ---------- Barre de progression ----------
  const seekInput = document.getElementById('seek');
  const timeCurrent = document.getElementById('time-current');
  const timeDuration = document.getElementById('time-duration');
  let progressTimer = null;
  let seeking = false;

  function formatTime(s) {
    if (!isFinite(s) || s < 0) s = 0;
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function startProgressPolling() {
    if (progressTimer) clearInterval(progressTimer);
    progressTimer = setInterval(async () => {
      if (seeking) return;
      try {
        const r = await fetch('/yt/progress');
        const p = await r.json();
        if (p.duration > 0) {
          seekInput.max = Math.floor(p.duration);
          seekInput.value = Math.floor(p.currentTime);
          timeCurrent.textContent = formatTime(p.currentTime);
          timeDuration.textContent = formatTime(p.duration);
        }
      } catch (e) {}
    }, 1000);
  }

  seekInput.addEventListener('input', () => {
    seeking = true;
    timeCurrent.textContent = formatTime(parseFloat(seekInput.value));
  });
  seekInput.addEventListener('change', () => {
    const t = parseFloat(seekInput.value);
    postYtCommand('seekTo', [t, true]);
    fetch('/yt/seek?t=' + t, { method: 'POST' }).catch(() => {});
    setTimeout(() => { seeking = false; }, 1000);
  });

  function refreshYtImage() {
    ytImg.src = '/yt/frame.jpg?t=' + Date.now();
  }
  function startYtRefresh() {
    if (ytTimer) clearInterval(ytTimer);
    const fps = parseFloat(fpsSlider.value);
    refreshYtImage();
    ytTimer = setInterval(refreshYtImage, 1000 / fps);
  }
  fpsSlider.addEventListener('input', () => {
    fpsVal.textContent = fpsSlider.value;
    startYtRefresh();
  });

  function playVideo(id, title) {
    currentYtId = id;
    isPaused = false;
    pauseBtn.textContent = '⏸ Pause';
    playerTitle.textContent = title || id;
    ytImgWrap.classList.remove('fill');
    fitBtn.textContent = '⛶';
    fitBtn.title = 'Plein écran';
    showView('player');
    startYtRefresh();

    ytFrame.src = `https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    ytFrame.onload = () => setTimeout(() => postYtCommand('playVideo'), 500);

    fetch('/yt/load?id=' + encodeURIComponent(id), { method: 'POST' }).catch(() => {});
    startProgressPolling();
  }

  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    if (isPaused) {
      postYtCommand('pauseVideo');
      fetch('/yt/pause', { method: 'POST' }).catch(() => {});
      pauseBtn.textContent = '▶ Lecture';
    } else {
      postYtCommand('playVideo');
      fetch('/yt/resume', { method: 'POST' }).catch(() => {});
      pauseBtn.textContent = '⏸ Pause';
    }
  });

  stopBtn.addEventListener('click', () => {
    postYtCommand('stopVideo');
    ytFrame.src = '';
    fetch('/yt/unload', { method: 'POST' }).catch(() => {});
    if (ytTimer) clearInterval(ytTimer);
    if (progressTimer) clearInterval(progressTimer);
    currentYtId = null;
    showView('search');
  });

  backSearchBtn.addEventListener('click', () => {
    showView('search');
  });

  // ---------- Réglages ----------
  document.getElementById('settings-btn-yt').addEventListener('click', () => {
    favTextarea.value = getFavorites().join('\n');
    showView('settings');
  });
  document.getElementById('settings-close').addEventListener('click', () => {
    const favs = favTextarea.value.split('\n').map(s => s.trim()).filter(Boolean);
    localStorage.setItem('favChannels', JSON.stringify(favs));
    renderFavorites();
    showView(currentYtId ? 'player' : 'search');
  });
</script>

</body>
</html>
