services:
  web:
    image: nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - ytcap

  ytcap:
    build: ./ytcap
    restart: unless-stopped
    expose:
      - "3000"
    shm_size: '1gb'
