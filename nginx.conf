server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ =404;
    }

    location /yt/ {
        proxy_pass http://ytcap:3000/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
}
